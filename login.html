<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IVAD · Login Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f5f5f5; }
  .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 100%; max-width: 400px; }
  .login-box img { max-width: 150px; margin-bottom: 20px; }
  .login-box h2 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 30px; }
  .login-box input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 20px; font-family: 'Inter', sans-serif; font-size: 16px; }
  .login-box button { width: 100%; padding: 12px; background: #1a1a1a; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 14px; letter-spacing: 1px; transition: background 0.3s; }
  .login-box button:hover { background: #333; }
  .error-msg { color: #d93025; font-size: 14px; margin-bottom: 15px; display: none; }
</style>
</head>
<body>
  <div class="login-box">
    <img src="Logo.png" alt="IVAD" />
    <h2>Acceso Restringido</h2>
    <form id="loginForm">
      <div class="error-msg" id="errorMsg">Contraseña incorrecta</div>
      <input type="password" id="password" placeholder="Contraseña de Administrador" required />
      <button type="submit">ENTRAR AL PANEL</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/admin';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
